<!DOCTYPE html>
{% extends 'dashboard.html' %}
{% block content %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Easy</title>
</head>
<body>
<div class="col-12 grid-margin stretch-card">
                <div class="card">
                  <div class="card-body">
                    <h4 class="card-title">Edit Service</h4>
<!--                    <p class="card-description"> Basic form elements </p>-->
                    <form class="forms-sample" method="post" action="" enctype="multipart/form-data"  >
                        {% csrf_token %}
                      <div class="form-group">
                        <label for="exampleInputName1">Service Name</label>
                        <input type="text" name="service_name" class="form-control" id="exampleInputName1" placeholder="Category Name" required value="{{s_data.ServiceName}}">
                      </div>
                      <div class="form-group">
                        <label for="exampleTextarea1">Description</label>
                        <textarea class="form-control" id="exampleTextarea1" name="service_description" placeholder="Description" rows="4" required></textarea>
                      </div>
                      <div class="form-group">
                        <label>Service Image</label>
                        <input type="file" name="service_image" class="form-control"  required>
                      </div>

                      <button type="submit" class="btn btn-primary mr-2">Submit</button>
<!--                      <button class="btn btn-dark">Cancel</button>-->
                    </form>
                  </div>
                </div>
              </div>

</body>
</html>
{% endblock %}
